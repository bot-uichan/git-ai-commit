name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag to release (e.g. v0.1.4). Leave empty to run build only."
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64-modern
            asset: git-ai-commit-linux-x64
          - os: ubuntu-latest
            target: bun-linux-arm64
            asset: git-ai-commit-linux-arm64
          - os: macos-latest
            target: bun-darwin-arm64
            asset: git-ai-commit-darwin-arm64
          - os: macos-13
            target: bun-darwin-x64
            asset: git-ai-commit-darwin-x64
          - os: windows-latest
            target: bun-windows-x64
            asset: git-ai-commit-windows-x64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps
        run: bun install

      - name: Build binary
        run: |
          mkdir -p release
          bun build src/cli.ts --compile --target=${{ matrix.target }} --outfile release/${{ matrix.asset }}

      - name: Generate checksum
        run: |
          python - <<'PY'
          import hashlib
          from pathlib import Path

          asset = Path("release/${{ matrix.asset }}")
          digest = hashlib.sha256(asset.read_bytes()).hexdigest()
          Path(f"{asset}.sha256").write_text(f"{digest}  {asset.name}\n", encoding="utf-8")
          PY

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: |
            release/${{ matrix.asset }}
            release/${{ matrix.asset }}.sha256

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && startsWith(github.event.inputs.release_tag, 'v'))

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}
          files: |
            release/*
          generate_release_notes: true
